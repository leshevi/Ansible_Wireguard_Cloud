---
stages:
  - ⚒️tool_creation
  - lint
  - prepare_gitlab
  - 🚀deploy

variables:
  ANSIBLE_PYTHON_INTERPRETER: /usr/bin/python3
  ANSIBLE_REMOTE_TMP: /tmp
  ANSIBLE_FORCE_COLOR: 'true'
  ANSIBLE_STARATEGY: linear
  ANSIBLE_PIPELINING: 1
  ANSIBLE_TRANSPORT: ssh
  ANSIBLE_BECOME_METHOD: su
  ANSIBLE_BECOME_USER: root
  ANSIBLE_BECOME_ASKPASS: 'False'
  ANSIBLE_FORCE_HANDLER: 'True'
  ANSIBLE_ASK_PASS: 'False'
  ANSIBLE_NOCOWS: 1
  ANSIBLE_STDOUT_CALLBACK: "ansible.builtin.default"
  ANSIBLE_RESULT_FORMAT: yaml
  ANSIBLE_HOST_KEY_CHECKING: 'false'
  ANSIBLE_DEPRECATION_WARNINGS: 'false'
  ANSIBLE_TIMEOUT: 60
  ANSIBLE_BECOME_EXE: 'sudo -p "Password: " su -'
  HOSTS_FILE: hosts.yml
  ANSIBLE_ROLES_PATH: "$CI_PROJECT_DIR/roles"
  ARCHIVE: "$CI_PROJECT_DIR/backups"


.job_inj:
  before_script:
    - eval $(ssh-agent -s)
    - echo "$SSH_ROOT_PRIVATE_KEY" | tr -d '\r' | ssh-add -


image: leshevi1/lin-ansible:jmespath

🔨generate_inventory:
  stage: ⚒️tool_creation
  tags:
    - Docker
  variables:
    SERVER_IPS: 188.225.79.2,188.225.75.2
    SERVER_NAMES: wir-server,server-client
    USERS_NAMES: ansible,ansible
  extends: .job_inj
  before_script:
    - mkdir -p $ANSIBLE_ROLES_PATH
  script:
    - |
      if [ -f "$HOSTS_FILE" ]; then
        echo "Using existing hosts.yml file"
      else
        echo "Generating dynamic hosts.yml file"
        echo "all:" >> hosts.yml
        echo "  hosts:" >> hosts.yml
        IFS=',' read -ra SERVER_LIST <<< "$SERVER_IPS"
        IFS=',' read -ra SERVER_NAMES <<< "$SERVER_NAMES"
        IFS=',' read -ra USER_NAMES <<< "$USERS_NAMES"

        for i in "${!SERVER_LIST[@]}"; do
          server_ip="${SERVER_LIST[$i]}"
          server_name="${SERVER_NAMES[$i]:-server$((i+1))}"
          user_name="${USER_NAMES[$i]:-server$((i+1))}"
          echo "    $server_name:" >> hosts.yml
          echo "      ansible_host: $server_ip" >> hosts.yml
          echo "      ansible_ssh_user: $user_name" >> hosts.yml
        done

        echo "Файл '$HOSTS_FILE' успешно создан и заполнен."
      fi
    - |
      if [ -f requirements1.yml ]; then
        echo "Installing roles from requirements1.yml..."
        ansible-galaxy install -r requirements1.yml --ignore-errors -p roles/ --force
      else
        echo "No requirements.yml found, creating example..."
        cat > requirements1.yml << EOF
        # roles from GitLab
        - src: 'https://oauth2:${ANSIBLE_TOKEN}@gitlab.com/ansible_playbooks7843206/docker.git'
          version: main
          name: docker
          scm: 'git'
      EOF

        ansible-galaxy install -r requirements1.yml -p roles/ --force
      fi
      echo "Installed roles:"
      ls -la roles/

  artifacts:
    paths:
      - $HOSTS_FILE
      - roles/
    expire_in: 1 hour

# Проверка синтаксиса и стиля кода
🎉ansible_lint_test:
  stage: lint
  dependencies:
    - 🔨generate_inventory
  extends: .job_inj
  tags:
    - Docker
  script:
    - ansible --version
    - ansible-lint --version
    - cat hosts.yml
    - ansible-lint -q --offline
    - ansible all -i hosts.yml -m ping


🚀deploy:
  stage: 🚀deploy
  tags:
    - Docker
  extends: .job_inj
  when: manual
  dependencies:
    - 🎉ansible_lint_test
    - 🔨generate_inventory
  script:
    - mkdir -p $ARCHIVE
    - |
      echo "Current directory structure:"
      ls -la

      echo "Inventory file:"
      cat hosts.yml

      echo "Running playbook..."
      ansible-playbook -i hosts.yml playbook.yml
  artifacts:
    paths:
      - $ARCHIVE
    expire_in: 1 hour
