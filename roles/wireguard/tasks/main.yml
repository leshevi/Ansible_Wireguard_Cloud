---
- name: Set hostname using hostname module
  ansible.builtin.hostname:
    name: "{{ inventory_hostname }}"

- name: Ensure hostname is in /etc/hosts
  ansible.builtin.lineinfile:
    path: /etc/hosts
    regexp: '^127\.0\.1\.1'
    line: "127.0.1.1 {{ inventory_hostname }} {{ inventory_hostname }}.localdomain"
    state: present

- name: Security hardening with fail2ban
  when: inventory_hostname == "wir-server"
  block:
    - name: Install fail2ban
      ansible.builtin.apt:
        name: fail2ban
        state: present
        update_cache: true

    - name: Configure fail2ban jail for SSH
      ansible.builtin.copy:
        dest: /etc/fail2ban/jail.local
        content: |
          [DEFAULT]
          bantime  = 1h
          findtime = 10m
          maxretry = 5

          [sshd]
          enabled = true
          port    = ssh
          logpath = %(sshd_log)s
          backend = %(sshd_backend)s
        mode: "0644"

    - name: Restart fail2ban
      ansible.builtin.systemd:
        name: fail2ban
        state: restarted
        enabled: true

- name: Configure WireGuard Server
  when: inventory_hostname == "wir-server"
  block:
    - name: Install dependencies
      ansible.builtin.apt:
        name:
          - ufw
          - python3-passlib
          - cron
          - inotify-tools
        state: present
        update_cache: true

    - name: Enable IPv4 Forwarding
      ansible.posix.sysctl:
        name: net.ipv4.ip_forward
        value: '1'
        state: present
        reload: true

    - name: Open UDP 49210 and Web UI port
      community.general.ufw:
        rule: allow
        port: "{{ item.port }}"
        proto: "{{ item.proto }}"
      loop:
        - { port: '49210', proto: 'udp' }
        - { port: '49211', proto: 'tcp' }

    - name: Setup NAT (Masquerade)
      ansible.builtin.iptables:
        table: nat
        chain: POSTROUTING
        out_interface: "{{ ansible_facts['default_ipv4']['interface'] }}"
        jump: MASQUERADE
      notify: Save Iptables

    - name: Create WG Network
      community.docker.docker_network:
        name: wg_net

    - name: Run WG-Easy Container
      community.docker.docker_container:
        name: wg-easy
        image: ghcr.io/wg-easy/wg-easy
        state: started
        restart_policy: always
        published_ports: ["49210:51820/udp", "49211:51821/tcp"]
        env:
          WG_HOST: "{{ ansible_host }}"
          PASSWORD_HASH: '$2b$12$yUmDROodENthhaiQNey2eOb2Hq/GrN464gz/kVf78N6pXURDs10DS'
          WG_DEFAULT_KEEPALIVE: "25"
          TG_TOKEN: "{{ wireguard_wg_token }}"
          TG_CHAT_ID: "{{ wireguard_wg_id }}"
        capabilities: [NET_ADMIN, SYS_MODULE]
        sysctls:
          net.ipv4.conf.all.src_valid_mark: "1"
          net.ipv4.ip_forward: "1"
        volumes: ["/etc/wireguard:/etc/wireguard"]

    - name: Wait for wg-easy to be ready
      ansible.builtin.command: "docker inspect -f '{% raw %}{{.State.Running}}{% endraw %}' wg-easy"
      register: wireguard_result
      until: wireguard_result.stdout == "true"
      retries: 10
      delay: 5
      changed_when: false

    - name: Run Wg-notifier Container
      community.docker.docker_container:
        name: wg-monitor
        image: leshevi1/wg-monitor:v01
        state: started
        restart_policy: always
        volumes: ["/etc/wireguard:/etc/wireguard:ro"]
        network_mode: "container:wg-easy"
        capabilities:
          - NET_ADMIN
        env:
          TELEGRAM_TOKEN: "{{ wireguard_wg_token }}"
          TELEGRAM_CHAT_ID: "{{ wireguard_wg_id }}"
        comparisons:
          networks: ignore

    - name: Wait for API
      ansible.builtin.wait_for:
        host: "{{ ansible_host }}"
        port: 49211
        timeout: 30
        delay: 5

    - name: Login to WG-Easy and get Session Cookie
      ansible.builtin.uri:
        url: "http://{{ ansible_host }}:49211/api/session"
        method: POST
        body_format: json
        body:
          password: "{{ wireguard_web_ui_password }}"
      register: wireguard_login

    - name: Create Wireguard Client using Session
      ansible.builtin.uri:
        url: "http://{{ ansible_host }}:49211"
        method: POST
        headers:
          Cookie: "{{ wireguard_login.set_cookie }}"
        body_format: json
        body:
          name: "{{ wireguard_client_name }}"
        status_code: [200, 405, 500]
      register: wireguard_client_response

    - name: Fetch Client Configuration
      ansible.builtin.uri:
        url: "http://{{ ansible_host }}:49211/api/wireguard/client"
        method: GET
        headers:
          Cookie: "{{ wireguard_login.set_cookie }}"
      register: wireguard_clients_list

    - name: Find Client ID
      ansible.builtin.set_fact:
        wireguard_client_id: "{{ wireguard_clients_list.json | selectattr('name', 'equalto', wireguard_client_name) | map(attribute='id') | first }}"

    - name: Fetch actual Config text from API
      ansible.builtin.uri:
        url: "http://{{ ansible_host }}:49211/api/wireguard/client/{{ wireguard_client_id }}/configuration"
        method: GET
        return_content: true
        headers:
          Cookie: "{{ wireguard_login.set_cookie }}"
        status_code: [200, 405, 500]
      register: wireguard_client_config_response

- name: Configure WireGuard Client
  when: inventory_hostname == "server-client"
  block:
    - name: Install WireGuard
      ansible.builtin.apt:
        name: wireguard
        state: present
        update_cache: true

    - name: Show result content only
      ansible.builtin.debug:
        msg: "{{ hostvars['wir-server']['wireguard_client_config_response'].content }}"

    - name: Save wg0.conf
      ansible.builtin.copy:
        content: "{{ hostvars['wir-server']['wireguard_client_config_response'].content }}"
        dest: /etc/wireguard/wg0.conf
        mode: '0600'

    - name: Ensure "listen = on" is present in httpd.conf
      ansible.builtin.lineinfile:
        path: /etc/wireguard/wg0.conf
        regexp: "{{ item.reg }}"
        line: "{{ item.lin }}"
        state: present
      loop:
        - { reg: '^AllowedIPs = 0.0.0.0/0, ::/0', lin: 'AllowedIPs = 10.8.0.0/24, ::/0' }
        - { reg: 'Endpoint = 188.225.79.231:51820', lin: 'Endpoint = 188.225.79.231:49210' }

    - name: Add Magic SSH bypass to wg0.conf
      ansible.builtin.blockinfile:
        path: /etc/wireguard/wg0.conf
        insertafter: '^\[Interface\]'
        block: |
          # Добавляем правило, только если его нет (проверка через || true)
          PostUp = ip rule show | grep -q "lookup main" || ip rule add proto static pref 10 lookup main
          PostUp = ip rule add fwmark 0x1000 lookup 100 || true
          PostUp = ip route add default via {{ ansible_default_ipv4.gateway }} dev {{ ansible_default_ipv4.interface }} table 100 || true
          PostUp = iptables -t mangle -A OUTPUT -p tcp --sport {{ ansible_port | default(22) }} -j MARK --set-mark 0x1000

          PreDown = iptables -t mangle -D OUTPUT -p tcp --sport {{ ansible_port | default(22) }} -j MARK --set-mark 0x1000 || true
          PreDown = ip rule del fwmark 0x1000 lookup 100 || true
          PreDown = ip rule del proto static pref 10 lookup main || true

    - name: Start VPN Tunnel
      ansible.builtin.systemd:
        name: wg-quick@wg0
        state: restarted
        enabled: true
      async: 60
      poll: 5

    - name: Verification Ping
      ansible.builtin.command: "ping -c 3 {{ wireguard_server_internal_ip }}"
      register: wireguard_ping_res
      changed_when: false

    - name: Show Status
      ansible.builtin.debug:
        msg: "Connection Successful! Client can reach Server at {{ wireguard_server_internal_ip }}"
      when: wireguard_ping_res.rc == 0

- name: Setup WireGuard Backup
  when: inventory_hostname == "wir-server"
  block:
    - name: Create backup directory on server
      ansible.builtin.file:
        path: /opt/wg_backups
        state: directory
        mode: '0700'

    - name: Create a tar.gz archive of a single file.
      community.general.archive:
        path: /etc/wireguard
        dest: "/opt/wg_backups/wg-backup-{{ ansible_facts['date_time']['date'] }}.tar.gz"
        format: gz
        mode: "0644"
        force_archive: true

    - name: Create backup script
      ansible.builtin.copy:
        dest: /usr/local/bin/wg_backup.sh
        mode: '0700'
        content: |
          #!/bin/bash
          tar -czf /opt/wg_backups/wg-backup-$(date +%F).tar.gz /etc/wireguard

    - name: Add cron job for daily backup (03:00 AM)
      ansible.builtin.cron:
        name: "WireGuard daily backup"
        minute: "0"
        hour: "3"
        job: "/usr/local/bin/wg_backup.sh"

    - name: Check if backup file exists
      ansible.builtin.stat:
        path: "/opt/wg_backups/wg-backup-{{ ansible_facts['date_time']['date'] }}.tar.gz"
      register: wireguard_backup_file

    - name: Fetch latest backup to local machine
      ansible.builtin.fetch:
        src: "/opt/wg_backups/wg-backup-{{ ansible_facts['date_time']['date'] }}.tar.gz"
        dest: "./backups/"
        flat: true
      when: wireguard_backup_file.stat.exists
      register: wireguard_fetch_result

    - name: Fail if backup was not found
      ansible.builtin.fail:
        msg: "Бэкап за сегодня ещё не создан!"
      when: not wireguard_backup_file.stat.exists
